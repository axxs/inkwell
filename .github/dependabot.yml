version: 2
updates:
  # Keep pinned GitHub Action SHAs up to date (updates the SHA + version comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Keep the theme's build/dev dependencies up to date.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
